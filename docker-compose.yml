# Portainer: set variables under Stack → Environment variables (or "Load variables
# from .env file" in the stack editor). Compose substitutes ${VAR:-default} here;
# values are passed into containers via `environment` below (no env_file required).
#
# Required secrets to set in Portainer:
#   MAIL_PASSWORD, STALWART_ADMIN_PASSWORD
# Optional relay (leave SMTP_RELAY_HOST empty to disable):
#   SMTP_RELAY_HOST, SMTP_RELAY_PASSWORD, SMTP_RELAY_USERNAME
#
# Roundcube webmail defaults to http://localhost:8025 (IMAP/SMTP → stalwart:143 / stalwart:25).

x-mail-env: &mail-env
  MAIL_ADDRESS: ${MAIL_ADDRESS:-default@mail.thm64.com}
  MAIL_USER: ${MAIL_USER:-default}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-smartbox-dev}
  MAIL_DOMAIN: ${MAIL_DOMAIN:-mail.thm64.com}
  MAIL_HOSTNAME: ${MAIL_HOSTNAME:-mail.thm64.com}

x-relay-env: &relay-env
  SMTP_RELAY_HOST: ${SMTP_RELAY_HOST:-}
  SMTP_RELAY_PORT: ${SMTP_RELAY_PORT:-465}
  SMTP_RELAY_IMPLICIT_TLS: ${SMTP_RELAY_IMPLICIT_TLS:-true}
  SMTP_RELAY_USERNAME: ${SMTP_RELAY_USERNAME:-}
  SMTP_RELAY_PASSWORD: ${SMTP_RELAY_PASSWORD:-}
  SMTP_RELAY_ALLOW_INVALID_CERTS: ${SMTP_RELAY_ALLOW_INVALID_CERTS:-false}

services:
  stalwart:
    build:
      context: .
      dockerfile: services/stalwart/Dockerfile
    image: ${SMARTBOX_STALWART_IMAGE:-smartbox-stalwart:plaintext-v7}
    restart: unless-stopped
    environment:
      <<: [*mail-env, *relay-env]
      STALWART_ADMIN_USER: ${STALWART_ADMIN_USER:-admin}
      STALWART_ADMIN_PASSWORD: ${STALWART_ADMIN_PASSWORD:-smartbox-admin}
      STALWART_RECOVERY_ADMIN: ${STALWART_RECOVERY_ADMIN:-admin:${STALWART_ADMIN_PASSWORD:-smartbox-admin}}
    volumes:
      - stalwart-data:/var/lib/stalwart
    ports:
      - "${SMTP_HOST_PORT:-25}:25/tcp"
      - "${IMAP_HOST_PORT:-1143}:143/tcp"
      - "${STALWART_ADMIN_HOST_PORT:-8087}:8080/tcp"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import imaplib, os; u=os.environ.get('MAIL_USER','default'); d=os.environ.get('MAIL_DOMAIN','mail.thm64.com'); p=os.environ.get('MAIL_PASSWORD','smartbox-dev'); m=imaplib.IMAP4('127.0.0.1',143); m.login(f'{u}@{d}', p); m.logout()\" || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  roundcube:
    image: roundcube/roundcubemail:latest
    restart: unless-stopped
    depends_on:
      stalwart:
        condition: service_healthy
    environment:
      <<: *mail-env
      ROUNDCUBEMAIL_DB_TYPE: sqlite
      ROUNDCUBEMAIL_SKIN: elastic
      ROUNDCUBEMAIL_DEFAULT_HOST: ${ROUNDCUBEMAIL_IMAP_HOST:-stalwart}
      ROUNDCUBEMAIL_DEFAULT_PORT: ${ROUNDCUBEMAIL_IMAP_PORT:-143}
      ROUNDCUBEMAIL_SMTP_SERVER: ${ROUNDCUBEMAIL_SMTP_HOST:-stalwart}
      ROUNDCUBEMAIL_SMTP_PORT: ${ROUNDCUBEMAIL_SMTP_PORT:-25}
      ROUNDCUBEMAIL_USERNAME_DOMAIN: ${MAIL_DOMAIN:-mail.thm64.com}
    volumes:
      - roundcube-data:/var/roundcube/db
      - ./config/roundcube:/var/roundcube/config:ro
    ports:
      - "${ROUNDCUBE_HOST_PORT:-8025}:80/tcp"

volumes:
  stalwart-data:
    name: smartbox-stalwart-data
  roundcube-data:
    name: smartbox-roundcube-data
